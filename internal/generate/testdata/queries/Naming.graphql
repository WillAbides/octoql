# @octoqlgen(typename: "GitHubNamingResponse")
query GitHubNaming {
  account {
    # @octoqlgen(bind: "string")
    id
    # @octoqlgen(bind: "-")
    login
  }
  first: repository(owner: "octo", name: "one") {
    # @octoqlgen(typename: "FirstRepository")
    nameWithOwner
  }
  second: repository(owner: "octo", name: "two") {
    # @octoqlgen(typename: "SecondRepository")
    nameWithOwner
  }
  snake_case_type {
    id
    name
  }
  object {
    snake_case_field {
      id
    }
  }
}
