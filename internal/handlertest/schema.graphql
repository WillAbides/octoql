scalar CustomPropertyValue
scalar DateTime
scalar ArbitraryJSON

enum RepositoryVisibility {
  PRIVATE
  PUBLIC
}

interface Node {
  id: ID!
}

type Repository implements Node {
  id: ID!
  nameWithOwner: String!
  updatedAt: DateTime!
  propertyValue: CustomPropertyValue!
  issues(first: Int!, after: String): IssueConnection!
}

type Issue implements Node {
  id: ID!
  title: String!
}

type User implements Node {
  id: ID!
  login: String!
}

union SearchResultItem = Repository | Issue | User

type IssueConnection {
  nodes: [Issue!]!
  pageInfo: PageInfo!
}

type PageInfo {
  hasNextPage: Boolean!
  endCursor: String
}

input CreateRepositoryInput {
  name: String!
  ownerId: ID
  visibility: RepositoryVisibility
  clientMutationId: String
}

type CreateRepositoryPayload {
  repository: Repository
  clientMutationId: String
}

type Query {
  viewer: User!
  repository(
    owner: String!
    name: String!
    first: Int!
    after: String
  ): Repository
  node(id: ID!): Node
  search(query: String!): [SearchResultItem!]!
  echoProperty(value: CustomPropertyValue!): CustomPropertyValue!
  echoAt(value: DateTime!): DateTime!
  echoAny(value: ArbitraryJSON!): ArbitraryJSON!
}

type Mutation {
  createRepository(input: CreateRepositoryInput!): CreateRepositoryPayload!
}
