#
# Synthetic GitHub-shaped test schema. It is a generator fixture, not a GitHub
# API contract.

scalar Date
scalar DateTime
scalar PreciseDateTime
scalar URI
scalar GitObjectID
scalar BigInt
scalar JSON
scalar ComplexJSON

directive @preview(name: String!) on FIELD_DEFINITION

enum RepositoryVisibility {
  PUBLIC
  PRIVATE
  INTERNAL
}

enum IssueState {
  OPEN
  CLOSED
}

interface Node {
  id: ID!
  url: URI!
}

interface Actor {
  id: ID!
  url: URI!
  login: String!
}

interface Assignable {
  assignees: [Actor!]!
}

interface RepositoryOwner {
  id: ID!
  url: URI!
  login: String!
  repositories(first: Int, after: String): RepositoryConnection!
}

interface Starrable {
  id: ID!
  viewerHasStarred: Boolean!
}

type User implements Actor & Node & RepositoryOwner {
  id: ID!
  url: URI!
  login: String!
  name: String
  organizations: [Organization!]!
  starredRepositories: RepositoryConnection!
  repositories(first: Int, after: String): RepositoryConnection!
}

type Organization implements Actor & Node & RepositoryOwner {
  id: ID!
  url: URI!
  login: String!
  members: [User!]!
  repositories(first: Int, after: String): RepositoryConnection!
}

type Bot implements Actor & Node {
  id: ID!
  url: URI!
  login: String!
}

type EnterpriseUserAccount implements Actor & Node & RepositoryOwner {
  id: ID!
  url: URI!
  login: String!
  repositories(first: Int, after: String): RepositoryConnection!
}

type Account {
  id: ID!
  login: String!
}

type Repository implements Node & Starrable {
  id: ID!
  url: URI!
  nameWithOwner: String!
  visibility: RepositoryVisibility!
  owner: RepositoryOwner!
  databaseId: BigInt
  createdAt: DateTime!
  pushedAt: PreciseDateTime
  viewerHasStarred: Boolean!
  issues(filter: IssueFilter, states: [IssueState!], first: Int, after: String): IssueConnection!
  pullRequests(states: [IssueState!], first: Int, after: String): PullRequestConnection!
  parent: Repository
  related: [Repository!]!
  readme: Blob
  defaultBranch: Commit
}

type Issue implements Node & Assignable {
  id: ID!
  url: URI!
  title: String!
  state: IssueState!
  assignees: [Actor!]!
  repository: Repository!
}

type PullRequest implements Node & Assignable {
  id: ID!
  url: URI!
  title: String!
  state: IssueState!
  assignees: [Actor!]!
  repository: Repository!
  mergeCommit: Commit
}

union SearchResultItem = Repository | Issue | PullRequest | User | Organization

type SearchResultConnection {
  nodes: [SearchResultItem!]!
  edges: [SearchResultItemEdge!]!
  pageInfo: PageInfo!
}

type SearchResultItemEdge {
  cursor: String!
  node: SearchResultItem
}

type RepositoryConnection {
  nodes: [Repository!]!
  edges: [RepositoryEdge!]!
  pageInfo: PageInfo!
}

type RepositoryEdge {
  cursor: String!
  node: Repository
}

type IssueConnection {
  nodes: [Issue!]!
  edges: [IssueEdge!]!
  pageInfo: PageInfo!
}

type IssueEdge {
  cursor: String!
  node: Issue
}

type PullRequestConnection {
  nodes: [PullRequest!]!
  edges: [PullRequestEdge!]!
  pageInfo: PageInfo!
}

type PullRequestEdge {
  cursor: String!
  node: PullRequest
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type Blob {
  text: String
  byteSize: Int!
}

type Commit {
  oid: GitObjectID!
  parents: [Commit!]!
  author: GitActor
}

type GitActor {
  name: String
  email: String
}

type Release {
  name: String!
  publishedAt: Date
}

type Recursive {
  id: ID!
  next: Recursive
}

input RepositorySelector {
  owner: String!
  name: String!
  databaseID: ID
  topics: [String!]
  createdAfter: Date
}

input IssueFilter {
  states: [IssueState!] = [OPEN]
  labels: [String!]
  assignee: String
  milestone: Int
}

input SearchInput {
  query: String!
  first: Int = 10
  includeArchived: Boolean
}

input CreateRepositoryInput {
  name: String!
  visibility: RepositoryVisibility = PRIVATE
  owner: RepositorySelector!
}

input UpdateIssueInput {
  id: ID!
  state: IssueState
  dueOn: Date
}

input InputWithDefaults {
  requiredLabel: String! = "triage"
  optionalLabel: String = "unassigned"
}

input OmitemptyInput {
  requiredLabel: String!
  optionalLabel: String
}

input StructInput {
  field: String
}

input UseStructReferencesInput {
  struct: StructInput!
  nullableStruct: StructInput
  list: [StructInput!]!
  nullableList: [StructInput!]
}

input RecursiveInput {
  next: [RecursiveInput]
}

type snake_case_type {
  id: ID!
  name: String
}

type ObjectType {
  id: ID!
  snake_case_field: snake_case_type
}

type Query {
  viewer: User!
  account: Account!
  repository(owner: String!, name: String!): Repository
  repositoryBySelector(input: RepositorySelector!): Repository
  node(id: ID!): Node
  actor(login: String!): Actor
  repositoryOwner(login: String!): RepositoryOwner
  search(query: String!, type: SearchType!, first: Int, after: String): SearchResultConnection!
  searchByInput(input: SearchInput!): SearchResultConnection!
  latestRelease(publishedAfter: Date): Release
  getJSON: JSON
  getComplexJSON: ComplexJSON
  nestedNodes: [[[Node!]!]!]!
  recur(input: RecursiveInput!): Recursive
  default(input: InputWithDefaults! = {requiredLabel: "triage"}): Boolean
  omitempty(input: OmitemptyInput): Boolean
  useStructReferencesInput(input: UseStructReferencesInput!): Boolean
  snake_case_type: snake_case_type
  object: ObjectType!
}

type Mutation {
  createRepository(input: CreateRepositoryInput!): Repository!
  updateIssue(input: UpdateIssueInput!): Issue
  closeIssue(data: String!, req: Int, resp: Int, client: String): Issue
  addComment(input: AddCommentInput!): AddCommentPayload!
  addStar(input: AddStarInput!): AddStarPayload!
  removeStar(input: RemoveStarInput!): RemoveStarPayload!
}

enum SearchType {
  ISSUE
  REPOSITORY
  USER
}

input AddCommentInput {
  subjectId: ID!
  body: String!
  clientMutationId: String
}

type AddCommentPayload {
  subject: Node
  clientMutationId: String
}

input AddStarInput {
  starrableId: ID!
  clientMutationId: String
}

type AddStarPayload {
  starrable: Starrable
  clientMutationId: String
}

input RemoveStarInput {
  starrableId: ID!
  clientMutationId: String
}

type RemoveStarPayload {
  starrable: Starrable
  clientMutationId: String
}
