query RepositorySummary($owner: String!, $name: String!, $issueCount: Int! = 3) {
  repository(owner: $owner, name: $name) {
    ...RepositoryDetails
    issues(first: $issueCount, states: [OPEN], orderBy: {field: UPDATED_AT, direction: DESC}) {
      totalCount
      nodes {
        number
        title
        url
      }
    }
  }
}

fragment RepositoryDetails on Repository {
  id
  nameWithOwner
  createdAt
  url
  defaultBranchRef {
    name
    target {
      oid
      ... on Commit {
        committedDate
        messageHeadline
      }
    }
  }
}

query NodesByID($ids: [ID!]!) {
  nodes(ids: $ids) {
    __typename
    id
    ... on Repository {
      nameWithOwner
    }
    ... on User {
      login
    }
  }
}

mutation StarRepository($repositoryID: ID!, $clientMutationID: String) {
  addStar(input: {starrableId: $repositoryID, clientMutationId: $clientMutationID}) {
    clientMutationId
    starrable {
      __typename
      id
      stargazerCount
      viewerHasStarred
    }
  }
}

fragment PublicActorSummary on Actor {
    login
    url
    ... on User {
      name
    }
}

fragment PublicRepositoryOwnerSummary on RepositoryOwner {
    login
    repositories(first: 2) {
      nodes {
        nameWithOwner
      }
      pageInfo {
        hasNextPage
        endCursor
      }
      }
}

query GitHubAbstractCorpus($ids: [ID!]!, $login: String!, $query: String!, $after: String) {
    nodes(ids: $ids) {
      id
      ... on Actor {
        ...PublicActorSummary
      }
      ... on RepositoryOwner {
        ...PublicRepositoryOwnerSummary
      }
      ... on Repository {
        nameWithOwner
        issues(first: 2, after: $after, states: [OPEN]) {
          nodes {
            number
            title
          }
          pageInfo {
            hasNextPage
            endCursor
          }
        }
        pullRequests(first: 2, after: $after, states: [OPEN]) {
          nodes {
            number
            title
          }
          pageInfo {
            hasNextPage
            endCursor
          }
        }
      }
      ... on Issue {
        number
        title
        author {
          login
        }
        repository {
          nameWithOwner
        }
      }
      ... on PullRequest {
        number
        title
        author {
          login
        }
        repository {
          nameWithOwner
        }
      }
    }
    repositoryOwner(login: $login) {
      ...PublicRepositoryOwnerSummary
    }
    search(query: $query, type: ISSUE, first: 10, after: $after) {
      nodes {
        __typename
        ... on Repository {
          nameWithOwner
        }
        ... on Issue {
          number
          title
        }
        ... on PullRequest {
          number
          title
        }
        ... on User {
          login
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
}
