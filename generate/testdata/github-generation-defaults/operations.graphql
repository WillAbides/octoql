fragment SharedNodeFields on Node {
  id
  url
}

fragment SharedActorFields on Actor {
  id
  login
  ... on User {
    name
  }
}

fragment ConcreteUserFields on User {
  name
  organizations {
    login
  }
}

fragment NamedActorOnNode on Actor {
  login
  ... on User {
    name
  }
}

fragment NamedSearchItemOnNode on SearchResultItem {
  ... on Issue {
    title
  }
}

query GitHubAbstractSelections($id: ID!, $login: String!, $query: String!) {
  node(id: $id) {
    id
    url
    ... on Repository {
      nameWithOwner
      ...SharedNodeFields
    }
  }
  actor(login: $login) {
    ...SharedActorFields
  }
  repositoryOwner(login: $login) {
    id
    ...ConcreteUserFields
  }
  search(query: $query, type: REPOSITORY, first: 10) {
    nodes {
      ... on Repository {
        nameWithOwner
        owner {
          login
        }
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
  latestRepositoryEvent {
    subject {
      id
    }
    relatedSubjects {
      id
    }
  }
  firstNode: node(id: $id) {
    id
  }
  secondNode: node(id: $id) {
    id
  }
  inlineActorNode: node(id: $id) {
    ... on Actor {
      login
    }
  }
  namedActorNode: node(id: $id) {
    ...NamedActorOnNode
  }
  nestedActorNode: node(id: $id) {
    ... on Actor {
      ... on RepositoryOwner {
        login
      }
    }
  }
  unionNode: node(id: $id) {
    ...NamedSearchItemOnNode
  }
}

query AllActorImplementations($login: String!) {
  actor(login: $login) {
    ... on User {
      name
    }
    ... on Organization {
      login
    }
    ... on Bot {
      login
    }
    ... on EnterpriseUserAccount {
      login
    }
  }
}

query RuntimeAbstracts($id: ID!) {
  node(id: $id) {
    id
    url
    ... on Repository {
      nameWithOwner
    }
  }
  nestedNodes {
    id
    url
  }
  actorNode: node(id: $id) {
    ... on Actor {
      login
    }
  }
}
