version: 2
builds:
  - main: ./cmd/octoqlgen
    binary: octoqlgen
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.buildVersion={{if .IsSnapshot}}dev{{else}}{{.Tag}}{{end}}
    goos:
      - linux
      - darwin
      - windows
archives:
  - files:
      - LICENSE
      - THIRD_PARTY_NOTICES.md
checksum:
  name_template: checksums.txt
snapshot:
  version_template: "{{ .Tag }}-next"
release:
  disable: true
