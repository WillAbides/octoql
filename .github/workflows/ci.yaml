name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: WillAbides/setup-go-faster@v1
        id: setup-go
        with:
          go-version-file: go.mod
      - uses: actions/cache@v5
        with:
          path: |
            ${{ steps.setup-go.outputs.GOCACHE }}
            ${{ steps.setup-go.outputs.GOMODCACHE }}
          key: ${{ runner.os }}-test-${{ hashFiles('go.*', '.github/workflows/ci.yaml', 'script/*', '.bindown.yaml', '.goreleaser.yaml') }}
          restore-keys: ${{ runner.os }}-test-
      - run: script/test

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: WillAbides/setup-go-faster@v1
        id: setup-go
        with:
          go-version-file: go.mod
      - uses: actions/cache@v5
        with:
          path: |
            ${{ steps.setup-go.outputs.GOCACHE }}
            ${{ steps.setup-go.outputs.GOMODCACHE }}
          key: ${{ runner.os }}-lint-${{ hashFiles('go.*', '.github/workflows/ci.yaml', 'script/*', '.bindown.yaml', '.goreleaser.yaml') }}
          restore-keys: ${{ runner.os }}-lint-
      - run: script/lint

  generate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: WillAbides/setup-go-faster@v1
        id: setup-go
        with:
          go-version-file: go.mod
      - uses: actions/cache@v5
        with:
          path: |
            ${{ steps.setup-go.outputs.GOCACHE }}
            ${{ steps.setup-go.outputs.GOMODCACHE }}
          key: ${{ runner.os }}-generate-${{ hashFiles('go.*', '.github/workflows/ci.yaml', 'script/*', '.bindown.yaml', '.goreleaser.yaml') }}
          restore-keys: ${{ runner.os }}-generate-
      - run: script/generate --check

  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: WillAbides/setup-go-faster@v1
        id: setup-go
        with:
          go-version-file: go.mod
      - uses: actions/cache@v5
        with:
          path: |
            ${{ steps.setup-go.outputs.GOCACHE }}
            ${{ steps.setup-go.outputs.GOMODCACHE }}
          key: ${{ runner.os }}-release-${{ hashFiles('go.*', '.github/workflows/ci.yaml', 'script/*', '.bindown.yaml', '.goreleaser.yaml') }}
          restore-keys: ${{ runner.os }}-release-
      - run: script/bindown -q install goreleaser
      - run: bin/goreleaser release --snapshot --clean
      - name: Validate archive contents
        shell: bash
        run: |
          mapfile -t archives < <(
            jq -r '
              .[]
              | select(.type == "Archive")
              | [.path, .extra.Format]
              | @tsv
            ' dist/artifacts.json
          )
          test "${#archives[@]}" -gt 0
          for artifact in "${archives[@]}"; do
            IFS=$'\t' read -r archive format <<< "$artifact"
            case "$format" in
              tar.gz | tar.xz | tar.bz2)
                contents="$(tar -tf "$archive")"
                ;;
              zip)
                contents="$(unzip -Z1 "$archive")"
                ;;
              *)
                echo "unsupported archive format: $format" >&2
                exit 1
                ;;
            esac
            printf '%s\n' "$contents" | grep -Eq '(^|/)LICENSE$'
            printf '%s\n' "$contents" | grep -Eq '(^|/)THIRD_PARTY_NOTICES\.md$'
          done
