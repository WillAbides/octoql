$schema: https://json-schema.org/draft/2020-12/schema
title: octoqlgen configuration
description: Configuration for generating a GitHub GraphQL client with octoqlgen.
type: object
x-go-type-name: Config
additionalProperties: false
required:
  - schema
  - operations
  - generated
properties:
  schema:
    $ref: '#/$defs/schema'
  operations:
    description: Paths or glob patterns selecting GraphQL operations.
    type: array
    items:
      type: string
    examples:
      - graphql/**/*.graphql
  generated:
    description: Path for the generated GraphQL client Go file.
    type: string
    examples:
      - githubapi/generated.go
  package:
    description: Go package name override for the generated client.
    type: string
  export_operations:
    description: Optional path for the generated JSON operation manifest.
    type: string
  context_type:
    description: Fully qualified generated helper context type, or "-" to omit context arguments.
    type: string
  client_getter:
    description: Fully qualified function used by generated helpers to obtain a client.
    type: string
  bindings:
    description: GraphQL type bindings keyed by GraphQL type name.
    type: object
    x-go-type: map[string]*Binding
    additionalProperties:
      $ref: '#/$defs/binding'
  package_bindings:
    description: Go packages whose exported types are added as GraphQL type bindings.
    type: array
    items:
      $ref: '#/$defs/packageBinding'
  casing:
    $ref: '#/$defs/casing'
  use_struct_references:
    description: Whether generated struct fields default to pointers with omitempty.
    type: boolean
  omit_unreferenced_implementations:
    description: Whether abstract selections omit implementations not referenced by fragments. Defaults to true.
    type: boolean
  test_handler:
    $ref: '#/$defs/testHandler'
$defs:
  binding:
    description: Go binding for a GraphQL type.
    type: object
    additionalProperties: false
    properties:
      type:
        description: Fully qualified Go type.
        type: string
      expect_exact_fields:
        description: GraphQL selection that must exactly match uses of this binding.
        type: string
      marshaler:
        description: Fully qualified custom marshaler function.
        type: string
      unmarshaler:
        description: Fully qualified custom unmarshaler function.
        type: string
  packageBinding:
    description: Go package whose exported types become GraphQL bindings.
    type: object
    additionalProperties: false
    required:
      - package
    properties:
      package:
        description: Fully qualified Go package import path.
        type: string
  casing:
    description: GraphQL-to-Go name casing configuration.
    type: object
    additionalProperties: false
    properties:
      default:
        description: Default casing algorithm.
        type: string
      all_enums:
        description: Casing algorithm for enums without a specific override.
        type: string
      enums:
        description: Casing algorithm overrides keyed by GraphQL enum name.
        type: object
        x-go-type: map[string]string
        additionalProperties:
          type: string
  schema:
    description: Local schema path and optional pinned remote source.
    type: object
    additionalProperties: false
    required:
      - path
    properties:
      path:
        description: Path where the GraphQL schema is read or materialized.
        type: string
        examples:
          - .octoql/schema.graphql
      sha256:
        description: SHA-256 digest for the schema bytes.
        type: string
        examples:
          - c98cb9edeedd1fb56c8678c19a8ad540c8d0739dd94579dfedbe044192e4ab18
      source:
        $ref: '#/$defs/source'
  source:
    description: Remote source for the GraphQL schema.
    type: object
    additionalProperties: false
    properties:
      github_docs:
        $ref: '#/$defs/githubDocs'
      github_repository:
        $ref: '#/$defs/githubRepository'
      url:
        description: URL for the schema bytes.
        type: string
        examples:
          - https://schemas.example.com/github.graphql
  githubDocs:
    description: GitHub Docs GraphQL schema source.
    type: object
    additionalProperties: false
    required:
      - version
      - revision
    properties:
      version:
        description: GitHub product schema version.
        type: string
        examples:
          - fpt
          - ghec
          - ghes-3.17
      revision:
        description: Git revision in github/docs.
        type: string
        examples:
          - 45d83f459620340069df7c375a8867be62616d61
  githubRepository:
    description: Schema file in a GitHub or GitHub Enterprise repository.
    type: object
    additionalProperties: false
    required:
      - repository
      - revision
      - path
    properties:
      repository:
        description: Repository in owner/name form.
        type: string
        examples:
          - octo-org/octo-repo
      revision:
        description: Git revision.
        type: string
        examples:
          - 45d83f459620340069df7c375a8867be62616d61
      path:
        description: Path to the schema in the repository.
        type: string
        examples:
          - schema/github.graphql
      host:
        description: GitHub host and optional port.
        type: string
        examples:
          - github.example.com
          - 192.0.2.10:8443
  testHandler:
    description: Generated test handler configuration.
    type: object
    additionalProperties: false
    required:
      - generated
    properties:
      generated:
        description: Path for the generated test handler Go file.
        type: string
        examples:
          - githubapitest/generated.go
      types:
        description: Source of generated test handler operation types.
        type: string
        enum:
          - client
          - local
        default: client
