# yaml-language-server: $schema=../octoqlgen.schema.yaml
# octoql.yaml is octoqlgen's configuration file.
#
# `octoqlgen schema` reads octoql.yaml by default. Pass `--config PATH` to use
# a different file. Paths and operation globs are resolved relative to this
# file without changing the values stored here.
#
# The schema directive above provides editor guidance for the intended
# structure. Remote sources require a canonical lowercase SHA-256 when
# materialized. GitHub sources also require a full commit revision.
schema:
  path: .octoql/schema.graphql
  sha256: c98cb9edeedd1fb56c8678c19a8ad540c8d0739dd94579dfedbe044192e4ab18
  source:
    # Supported versions are fpt, ghec, and ghes-X.Y.
    github_docs:
      version: fpt
      revision: 45d83f459620340069df7c375a8867be62616d61

    # Use github_repository instead of github_docs for a pinned file in a
    # GitHub or GitHub Enterprise repository. host defaults to github.com.
    #
    # github_repository:
    #   repository: owner/repository
    #   revision: 45d83f459620340069df7c375a8867be62616d61
    #   path: path/to/schema.graphql
    #   host: github.example.com

    # Use url instead of a GitHub source for an exact URL. Reproducible
    # rematerialization requires an immutable URL. The SHA-256 protects the
    # bytes, but a mutable URL may stop serving those bytes later.
    #
    # url: https://example.com/schema.graphql

# Omit schema.source for a local-only schema. schema.sha256 is optional for a
# local schema and is verified when present.
operations:
  - graphql/**/*.graphql
generated: internal/githubapi/generated.go
# test_handler is optional.
test_handler:
  generated: internal/githubapitest/generated.go

# GitHub repository authentication is discovered in this order: GH_TOKEN,
# GITHUB_TOKEN, `gh auth token --hostname HOST`, then anonymous access. A token
# that the server rejects is reported as an error and is never retried
# anonymously.
