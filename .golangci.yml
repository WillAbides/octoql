version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - durationcheck
    - errcheck
    - errorlint
    - forbidigo
    - gocritic
    - govet
    - ineffassign
    - nakedret
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
    errorlint:
      errorf: false
    forbidigo:
      forbid:
        - pattern: ^print(|f|ln)$
        - pattern: ^fmt\.Print(|f|ln)$
    gocritic:
      disabled-checks:
        - builtinShadow
        - commentedOutCode
        - importShadow
        - paramTypeCombine
        - unnamedResult
        - ifElseChain
        - sloppyReassign
        - typeDefFirst
      enabled-tags:
        - diagnostic
        - performance
        - style
      settings:
        captLocal:
          paramsOnly: true
    govet:
      enable-all: true
      disable:
        - fieldalignment
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - forbidigo
        path: ^example/|^internal/generate/main\.go$|^cmd/octoqlgen/
      - linters:
          - errcheck
        path: _test\.go$
        text: ^Error return value is not checked$
      - linters:
          - unparam
        path: _test\.go$
      - linters:
          - staticcheck
        path: ^internal/generate/parse\.go$
        text: 'SA1019: validator\.Validate is deprecated'
      - linters:
          - staticcheck
        path: ^internal/integration/integration_test\.go$
        text: 'QF1008: could remove embedded field'
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
