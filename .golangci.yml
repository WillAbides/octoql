version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - depguard
    - durationcheck
    - errcheck
    - errorlint
    - forbidigo
    - gocritic
    - govet
    - ineffassign
    - nakedret
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    depguard:
      rules:
        main:
          list-mode: strict
          files:
            - $all
          allow:
            - $gostd
            - github.com/willabides/octoql
            - github.com/vektah/gqlparser/v2
            - golang.org/x/tools
            - gopkg.in/yaml.v2
            - gopkg.in/yaml.v3
            - github.com/alecthomas/kong
            - github.com/bmatcuk/doublestar/v4
            - github.com/google/uuid
    errcheck:
      check-type-assertions: true
    errorlint:
      errorf: false
    forbidigo:
      forbid:
        - pattern: ^print(|f|ln)$
        - pattern: ^fmt\.Print(|f|ln)$
    gocritic:
      disabled-checks:
        - builtinShadow
        - commentedOutCode
        - importShadow
        - paramTypeCombine
        - unnamedResult
        - ifElseChain
        - sloppyReassign
        - typeDefFirst
      enabled-tags:
        - diagnostic
        - performance
        - style
      settings:
        captLocal:
          paramsOnly: true
    govet:
      enable-all: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - depguard
        path: _test\.go$|^internal/testutil/|^internal/integration/
      - linters:
          - forbidigo
        path: ^example/|^generate/main\.go$|^cmd/octoqlgen/
      - linters:
          - errcheck
        path: _test\.go$
        text: ^Error return value is not checked$
      - linters:
          - unparam
        path: _test\.go$
      - linters:
          - govet
        path: ^generate/|^example/
        text: '^fieldalignment: struct with \d+ pointer bytes could be \d+$'
      - linters:
          - staticcheck
        path: ^generate/parse\.go$
        text: 'SA1019: validator\.Validate is deprecated'
      - linters:
          - staticcheck
        path: ^internal/integration/integration_test\.go$
        text: 'QF1008: could remove embedded field'
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
